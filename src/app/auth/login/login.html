<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card shadow-lg p-4 login-card">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-primary">Colegio San Alfonso</h3>
      <p class="text-muted">Portal Académico</p>
    </div>

    <form>
      <div class="mb-3">
        <label for="username" class="form-label">DNI</label>
        <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••">
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="remember">
        <label class="form-check-label" for="remember">Recordar sesión</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">Ingresar</button>
    </form>

    <div class="mt-4 text-center">
      <small><a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a></small>
    </div>
  </div>
</div>
